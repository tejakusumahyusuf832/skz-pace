name: Daily Raw SKZ YouTube Metadata Extraction

on:
  schedule:
    - cron: "5 15 * * *" # Runs every day at 15:05 UTC
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  extract_and_load:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Raw SKZ YouTube Metadata Extraction
        env:
          RAW_SKZ_PACE_DB_URL: ${{ secrets.RAW_SKZ_PACE_DB_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: uv run python -m src.etl.raw_metadata --uri-key RAW_SKZ_PACE_DB_URL --api-key YOUTUBE_API_KEY